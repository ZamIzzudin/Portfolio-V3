<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Minimal & Flexible Ghost Theme for Personal Website & Portfolio"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Personal Portfolio - Azzam</title>

    <!-- Prevent theme flash before Vue mounts -->
    <script>
      ;(function () {
        try {
          var key = 'porto-theme'
          var stored = localStorage.getItem(key)
          var mode =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = mode
          document.documentElement.classList.toggle('dark', mode === 'dark')
          document.documentElement.style.colorScheme = mode
        } catch (e) {}
      })()
    </script>

    <!-- Satoshi (sans) via Fontshare -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap"
    />
    <!-- IBM Plex Serif for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
